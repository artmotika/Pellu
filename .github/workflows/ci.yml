name: Pellu CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  java-build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build and Test Java Services
      run: ./gradlew build test --no-daemon

  smart-contract-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Run Smart Contract Unit Tests
      working-directory: ./smart-contract
      run: cargo test

  upload-reports:
    needs: [java-build-and-test, smart-contract-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      with:
        name: all-test-reports
        path: "**/build/reports/tests/test/"
