name: Pellu CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  java-build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build and Test Java Services
      run: ./gradlew build test --no-daemon

  smart-contract-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt, clippy

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libssl-dev libudev-dev

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          smart-contract/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Run Smart Contract Unit Tests
      working-directory: ./smart-contract
      run: cargo test --workspace --verbose

  upload-reports:
    needs: [java-build-and-test, smart-contract-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      with:
        name: all-test-reports
        path: "**/build/reports/tests/test/"
