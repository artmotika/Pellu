apiVersion: apps/v1
kind: Deployment
metadata:
  name: solana-connector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: solana-connector
  template:
    metadata:
      labels:
        app: solana-connector
    spec:
      hostNetwork: true
      containers:
      - name: solana-connector
        image: solana-connector:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
        env:
        - name: KAFKA_BROKERS
          value: localhost:9092
        - name: SOLANA_RPC_URL
          value: http://localhost:8899
        - name: SOLANA_PROGRAM_ID
          value: Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS
        - name: SOLANA_ADMIN_PRIVATE_KEY
          value: 3JhdAWiLtwKzjiqamDsNRz54QnvFs7myEYvYQiuAccWraULzxouRjiqnXinscEfymSdvDrSNTaPCW4xDBTYANov9
---
apiVersion: v1
kind: Service
metadata:
  name: solana-connector
spec:
  selector:
    app: solana-connector
  ports:
  - port: 8082
    targetPort: 8082
