apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 4
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: auth-service:local-test
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: "1000m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "1024Mi"
        ports:
        - containerPort: 8083
        env:
        - name: DB_URL
          value: jdbc:postgresql://postgres:5432/platform
        - name: DB_USERNAME
          value: postgres
        - name: DB_PASSWORD
          value: postgres
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: kafka-service:9092
        - name: REDIS_HOST
          value: redis-service
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
      volumes:
      - name: config-volume
        configMap:
          name: auth-service-config
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  type: NodePort
  selector:
    app: auth-service
  ports:
  - port: 8083
    targetPort: 8083
    nodePort: 30083
